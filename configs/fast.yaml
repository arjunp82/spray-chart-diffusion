seed: 42

checkpoint_dir: checkpoints/fast

data:
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 64
  gaussian_sigma_ft: 15
  min_pa_full_season: 100
  min_pa_situational: 30
  inpaint_k_min: 5
  inpaint_k_max: 100
  image_scale: 100.0

model:
  base_channels: 32           # smaller than full (64) — fewer params, faster
  channel_multipliers: [1, 2, 4, 8]
  batter_embedding_dim: 64
  situation_embedding_dim: 64
  timestep_embedding_dim: 64
  attention_heads: 4
  dropout: 0.1

diffusion:
  num_timesteps: 1000
  noise_schedule: cosine
  cfg_dropout_prob: 0.1

training:
  batch_size: 16              # small batch for CPU/MPS memory
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  epochs: 20
  warmup_steps: 100
  grad_clip: 1.0
  save_every_n_epochs: 5
  sample_every_n_steps: 9999  # disable mid-epoch sampling (slow on CPU)
  num_workers: 0              # 0 = no multiprocessing (avoids MPS fork issues)

evaluation:
  num_samples: 50
  calibration_level: 0.80
  pa_thresholds: [10, 25, 50, 100]
  min_pa_for_eval: 200
